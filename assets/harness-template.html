<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    padding-bottom: 120px;
  }

  /* --- Sticky Header --- */
  .dex-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(15, 15, 15, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #222;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .dex-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #aaa;
    margin-right: auto;
  }

  .dex-summary { font-size: 13px; color: #666; }

  /* --- Mockup Sections --- */
  .mockup-section {
    margin: 24px 20px;
    border: 2px solid #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
  }

  .mockup-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #111;
    border-bottom: 1px solid #1a1a1a;
  }

  .mockup-label {
    font-size: 15px;
    font-weight: 600;
    color: #ccc;
    flex: 1;
  }

  .rating-buttons { display: flex; gap: 6px; }
  .rating-buttons button {
    width: 36px; height: 32px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #1a1a1a;
    color: #666;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .rating-buttons button:hover { background: #252525; }
  .rating-buttons button[data-rating="down"].selected {
    background: #3a1515; border-color: #e74c3c; color: #ff6b6b;
  }
  .rating-buttons button[data-rating="up"].selected {
    background: #153a15; border-color: #2ecc71; color: #2ecc71;
  }

  .mockup-content {
    background: #fff;
    color: #000;
  }

  .feedback-panel {
    border-top: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .feedback-toggle {
    width: 100%; padding: 8px 16px;
    background: none; border: none;
    color: #555; font-size: 12px;
    cursor: pointer; text-align: left;
  }
  .feedback-toggle:hover { color: #888; }
  .feedback-body { display: none; padding: 12px 16px; }
  .feedback-body.open { display: block; }
  .feedback-body textarea {
    width: 100%; min-height: 60px; padding: 8px 10px;
    background: #111; border: 1px solid #222; border-radius: 6px;
    color: #ccc; font-size: 13px; resize: vertical; font-family: inherit;
  }
  .feedback-body textarea:focus { outline: none; border-color: #4a9eff; }

  /* --- Feedback Summary + Copy --- */
  .dex-feedback-summary {
    margin: 32px 20px;
    background: #111;
    border: 1px solid #222;
    border-radius: 12px;
    overflow: hidden;
  }
  .dex-feedback-summary h2 {
    padding: 12px 16px;
    font-size: 14px;
    color: #888;
    background: #0d0d0d;
    border-bottom: 1px solid #222;
  }
  .dex-feedback-text {
    padding: 16px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    color: #999;
    white-space: pre-wrap;
    line-height: 1.5;
    max-height: 400px;
    overflow-y: auto;
  }
  .dex-copy-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 0 20px 40px;
    padding: 14px;
    border: 2px solid #2ecc71;
    border-radius: 10px;
    background: #0d1f14;
    color: #2ecc71;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .dex-copy-btn:hover { background: #152a1a; }
  .dex-copy-btn.copied { border-color: #666; color: #666; background: #111; }

  /* --- Toast --- */
  .dex-toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 20, 0.95);
    border: 1px solid #2ecc71;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: #2ecc71;
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .dex-toast.visible { opacity: 1; }
</style>
</head>
<body>

<div class="dex-header">
  <h1>Design Explorer</h1>
  <div class="dex-summary" id="summary">0 mockups</div>
</div>

<!-- === MOCKUP SECTIONS GO HERE === -->

<div class="dex-feedback-summary" id="feedback-summary">
  <h2>Compiled Feedback</h2>
  <div class="dex-feedback-text" id="feedback-text">Vote or write notes above to see feedback here.</div>
</div>

<button class="dex-copy-btn" id="copy-btn">📋 Copy Feedback to Clipboard</button>

<div class="dex-toast" id="toast">Copied!</div>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'dex-draft';
  let state = loadDraft();

  function loadDraft() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : { ratings: {}, notes: {} };
    } catch { return { ratings: {}, notes: {} }; }
  }
  function saveDraft() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getMockups() { return Array.from(document.querySelectorAll('.mockup-section')); }

  // --- Rating + Notes (event delegation) ---
  document.addEventListener('click', (e) => {
    const ratingBtn = e.target.closest('.rating-buttons button[data-rating]');
    if (ratingBtn) {
      const section = ratingBtn.closest('.mockup-section');
      if (!section) return;
      const id = section.dataset.mockupId;
      const rating = ratingBtn.dataset.rating;

      if (state.ratings[id] === rating) {
        delete state.ratings[id];
        ratingBtn.classList.remove('selected');
      } else {
        state.ratings[id] = rating;
        section.querySelectorAll('.rating-buttons button').forEach(b => b.classList.remove('selected'));
        ratingBtn.classList.add('selected');
      }
      saveDraft();
      updateFeedback();
      return;
    }

    const toggle = e.target.closest('.feedback-toggle');
    if (toggle) {
      const body = toggle.nextElementSibling;
      if (body) {
        body.classList.toggle('open');
        toggle.textContent = body.classList.contains('open') ? '▾ Notes' : '▸ Notes';
      }
      return;
    }
  });

  document.addEventListener('input', (e) => {
    if (e.target.matches('.feedback-body textarea')) {
      const section = e.target.closest('.mockup-section');
      if (section) {
        state.notes[section.dataset.mockupId] = e.target.value;
        saveDraft();
        updateFeedback();
      }
    }
  });

  // --- Compile feedback text ---
  function compileFeedback() {
    const mockups = getMockups();
    if (mockups.length === 0) return 'No mockups loaded.';

    const lines = [];
    const ups = [];
    const downs = [];
    const unrated = [];

    for (const section of mockups) {
      const id = section.dataset.mockupId;
      const label = section.querySelector('.mockup-label')?.textContent || id;
      const rating = state.ratings[id];
      const notes = (state.notes[id] || '').trim();

      if (rating === 'up') ups.push({ label, notes });
      else if (rating === 'down') downs.push({ label, notes });
      else unrated.push({ label, notes });
    }

    if (ups.length) {
      lines.push('LIKED (👍):');
      for (const m of ups) {
        lines.push(`  - ${m.label}${m.notes ? ': ' + m.notes : ''}`);
      }
      lines.push('');
    }

    if (downs.length) {
      lines.push('DISLIKED (👎):');
      for (const m of downs) {
        lines.push(`  - ${m.label}${m.notes ? ': ' + m.notes : ''}`);
      }
      lines.push('');
    }

    if (unrated.length) {
      const withNotes = unrated.filter(m => m.notes);
      const without = unrated.filter(m => !m.notes);
      if (withNotes.length) {
        lines.push('UNRATED (with notes):');
        for (const m of withNotes) {
          lines.push(`  - ${m.label}: ${m.notes}`);
        }
        lines.push('');
      }
      if (without.length) {
        lines.push(`UNRATED: ${without.map(m => m.label).join(', ')}`);
        lines.push('');
      }
    }

    lines.push(`Total: ${ups.length} 👍, ${downs.length} 👎, ${unrated.length} unrated out of ${mockups.length}`);
    return lines.join('\n');
  }

  function updateFeedback() {
    const text = compileFeedback();
    document.getElementById('feedback-text').textContent = text;
    updateSummary();
  }

  function updateSummary() {
    const total = getMockups().length;
    const ups = Object.values(state.ratings).filter(r => r === 'up').length;
    const downs = Object.values(state.ratings).filter(r => r === 'down').length;
    const rated = ups + downs;
    document.getElementById('summary').textContent =
      `${total} mockups` + (rated ? ` · ${ups} 👍 ${downs} 👎` : '');
  }

  // --- Copy to clipboard ---
  document.getElementById('copy-btn').addEventListener('click', () => {
    const text = compileFeedback();
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      const toast = document.getElementById('toast');
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2000);
      setTimeout(() => { btn.textContent = '📋 Copy Feedback to Clipboard'; btn.classList.remove('copied'); }, 3000);
    });
  });

  // --- Restore state ---
  function restoreState() {
    for (const section of getMockups()) {
      const id = section.dataset.mockupId;
      if (state.ratings[id]) {
        const btn = section.querySelector(`.rating-buttons button[data-rating="${state.ratings[id]}"]`);
        if (btn) btn.classList.add('selected');
      }
      if (state.notes[id]) {
        const textarea = section.querySelector('.feedback-body textarea');
        if (textarea) textarea.value = state.notes[id];
      }
    }
  }

  // --- SSE auto-reload ---
  function connectSSE() {
    const es = new EventSource('/events');
    es.addEventListener('reload', () => { saveDraft(); location.reload(); });
    es.onerror = () => { es.close(); setTimeout(connectSSE, 2000); };
  }

  // --- Init ---
  function init() {
    restoreState();
    updateFeedback();
    connectSSE();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
