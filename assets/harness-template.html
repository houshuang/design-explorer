<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5; overflow: hidden; height: 100vh; width: 100vw; color: #333;
    }

    /* ── Top bar ─────────────────────────────── */
    #counter {
      position: fixed; top: 16px; left: 20px; z-index: 100;
      font-size: 14px; font-weight: 600; color: #666;
      background: rgba(255,255,255,0.92); padding: 5px 14px; border-radius: 20px;
      backdrop-filter: blur(8px); box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    #sessions {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
      display: flex; gap: 4px;
    }
    .session-pill {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid #ddd; background: rgba(255,255,255,0.92); cursor: pointer;
      backdrop-filter: blur(8px); color: #888; transition: all 0.2s;
    }
    .session-pill.active { background: #333; color: #fff; border-color: #333; }
    .session-pill:hover { border-color: #999; }
    #copy-btn {
      position: fixed; top: 16px; right: 20px; z-index: 100;
      font-size: 15px; cursor: pointer; background: rgba(255,255,255,0.92);
      padding: 0; width: 34px; height: 34px; border-radius: 20px; backdrop-filter: blur(8px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: none; transition: transform 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    #copy-btn:active { transform: scale(0.9); }
    #fit-btn {
      position: fixed; top: 16px; right: 62px; z-index: 100;
      font-size: 13px; cursor: pointer; background: rgba(255,255,255,0.92);
      padding: 0 14px; height: 34px; border-radius: 20px; backdrop-filter: blur(8px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: none; transition: all 0.15s;
      color: #888; font-weight: 500; font-family: inherit;
      display: flex; align-items: center; justify-content: center;
    }
    #fit-btn:active { transform: scale(0.9); }
    #fit-btn.active { background: #333; color: #fff; }

    /* ── Carousel ────────────────────────────── */
    #carousel {
      display: flex; height: 100vh;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .slide {
      min-width: 100vw; height: 100vh; display: flex; justify-content: center;
      overflow-y: auto; padding: 56px 32px 210px;
    }
    body.fit-mode .slide {
      overflow: hidden; align-items: flex-start; padding-top: 48px; padding-bottom: 0;
    }
    .slide-inner {
      max-width: 900px; width: 100%; background: #fff; border-radius: 12px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.06); padding: 32px; position: relative;
      border-top: 4px solid transparent; transition: border-color 0.25s, transform 0.25s;
      height: fit-content; transform-origin: top center;
    }
    .slide-inner.liked { border-top-color: #22c55e; }
    .slide-inner.disliked { border-top-color: #ef4444; }
    .slide-label {
      font-size: 13px; font-weight: 600; color: #999; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    /* ── Bottom bar ──────────────────────────── */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.94); backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,0,0,0.06); padding: 10px 24px 12px;
    }
    #bottom-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; gap: 10px;
    }
    .vote-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid #e8e8e8;
      background: white; font-size: 15px; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .vote-btn:hover { border-color: #ccc; background: #fafafa; }
    .vote-btn.active-up { border-color: #22c55e; background: #f0fdf4; }
    .vote-btn.active-down { border-color: #ef4444; background: #fef2f2; }

    #notes {
      flex: 1; min-width: 0; resize: none; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 7px 12px; font-size: 14px; font-family: inherit;
      height: 34px; max-height: 100px; line-height: 1.4;
      background: white; color: #333; outline: none; transition: border-color 0.2s;
    }
    #notes:focus { border-color: #666; }
    #notes::placeholder { color: #bbb; }
    #notes.streaming { border-color: #ef4444; background: #fef8f8; }

    #mic-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid #e8e8e8;
      background: white; font-size: 14px; cursor: default; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; position: relative;
    }
    #mic-btn.recording { border-color: #ef4444; background: #fef2f2; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #mic-btn.recording { animation: pulse 1.2s ease-in-out infinite; }

    #waveform {
      position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 40px; border-radius: 10px;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.06);
      opacity: 0; transition: opacity 0.2s; z-index: 101;
    }
    #waveform.active { opacity: 1; }

    /* ── Help overlay ────────────────────────── */
    #help-btn {
      position: fixed; bottom: 60px; right: 20px; z-index: 100;
      width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #ddd;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
      font-size: 13px; color: #aaa; cursor: pointer; display: flex;
      align-items: center; justify-content: center; font-weight: 600;
      transition: all 0.15s;
    }
    #help-btn:hover { border-color: #999; color: #666; }
    #shortcuts-overlay {
      position: fixed; bottom: 96px; right: 20px; z-index: 200;
      background: rgba(30,30,30,0.92); backdrop-filter: blur(12px);
      border-radius: 12px; padding: 16px 20px;
      display: none; min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    #shortcuts-overlay.visible { display: block; }
    .sc-row { display: flex; justify-content: space-between; gap: 24px; padding: 4px 0; }
    .sc-key { font-size: 12px; color: #999; }
    .sc-key kbd {
      display: inline-block; background: rgba(255,255,255,0.12); padding: 1px 6px;
      border-radius: 4px; font-family: inherit; font-size: 11px; color: #ccc;
      border: 1px solid rgba(255,255,255,0.08); min-width: 20px; text-align: center;
    }
    .sc-label { font-size: 12px; color: #888; }

    /* ── Empty state ─────────────────────────── */
    #empty-state {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; color: #bbb;
    }
    #empty-state h2 { font-weight: 400; font-size: 20px; margin-bottom: 6px; }
    #empty-state p { font-size: 14px; }
  </style>
</head>
<body>
  <div id="counter"></div>
  <div id="sessions"></div>
  <button id="fit-btn" title="Fit to window (F)">Fit</button>
  <button id="copy-btn" title="Copy feedback (C)">📋</button>

  <div id="carousel"></div>

  <div id="empty-state">
    <h2>Waiting for mockups…</h2>
    <p>HTML files in the mockup directory will appear here</p>
  </div>

  <div id="bottom-bar" style="display:none">
    <div id="bottom-inner">
      <button class="vote-btn" id="btn-up" title="Like (↑)">👍</button>
      <button class="vote-btn" id="btn-down" title="Dislike (↓)">👎</button>
      <textarea id="notes" placeholder="Notes… (Tab to focus)" rows="1"></textarea>
      <div id="mic-btn" title="Hold Space to record">🎤</div>
    </div>
    <canvas id="waveform" width="200" height="40"></canvas>
  </div>

  <div id="help-btn" title="Keyboard shortcuts (?)">?</div>
  <div id="shortcuts-overlay">
    <div class="sc-row"><span class="sc-key"><kbd>←</kbd> <kbd>→</kbd></span><span class="sc-label">Navigate</span></div>
    <div class="sc-row"><span class="sc-key"><kbd>↑</kbd> <kbd>↓</kbd></span><span class="sc-label">Like / Dislike</span></div>
    <div class="sc-row sc-voice"><span class="sc-key">Hold <kbd>Space</kbd></span><span class="sc-label">Voice note</span></div>
    <div class="sc-row"><span class="sc-key"><kbd>Tab</kbd></span><span class="sc-label">Focus notes</span></div>
    <div class="sc-row"><span class="sc-key"><kbd>F</kbd></span><span class="sc-label">Fit to window</span></div>
    <div class="sc-row"><span class="sc-key"><kbd>C</kbd></span><span class="sc-label">Copy feedback</span></div>
    <div class="sc-row"><span class="sc-key"><kbd>?</kbd></span><span class="sc-label">This help</span></div>
  </div>

  <script>
    /*__SONIOX_KEY_INJECT__*/

    // ── State ────────────────────────────────────
    const mockups = [];     // [{id, label, contentHtml, session, vote, notes, voiceNotes}]
    let currentIndex = 0;   // index into visible mockups
    let currentSession = null;
    let notesActive = false;
    let recording = false;

    // ── DOM refs ─────────────────────────────────
    const $ = (s) => document.getElementById(s);
    const carousel    = $('carousel');
    const counterEl   = $('counter');
    const sessionsEl  = $('sessions');
    const emptyState  = $('empty-state');
    const bottomBar   = $('bottom-bar');
    const notesEl     = $('notes');
    const btnUp       = $('btn-up');
    const btnDown     = $('btn-down');
    const waveform    = $('waveform');
    const micBtn      = $('mic-btn');
    const copyBtn     = $('copy-btn');
    const helpBtn     = $('help-btn');
    const helpOverlay = $('shortcuts-overlay');

    // ── Helpers ──────────────────────────────────
    function visible() {
      if (currentSession === null) return mockups;
      return mockups.filter(m => m.session === currentSession);
    }

    function visibleIndices() {
      const v = visible();
      return v.map(m => mockups.indexOf(m));
    }

    function currentMockup() {
      return visible()[currentIndex] || null;
    }

    // ── Carousel navigation ──────────────────────
    function goTo(idx) {
      const vi = visibleIndices();
      if (vi.length === 0) return;
      idx = Math.max(0, Math.min(idx, vi.length - 1));
      currentIndex = idx;
      carousel.style.transform = `translateX(-${vi[idx] * 100}vw)`;
      updateUI();
    }

    function navigate(dir) { goTo(currentIndex + dir); }

    function addSlide(mockup) {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.id = mockup.id;

      const inner = document.createElement('div');
      inner.className = 'slide-inner';

      const label = document.createElement('div');
      label.className = 'slide-label';
      label.textContent = mockup.label;

      const content = document.createElement('div');
      content.className = 'slide-content';
      content.innerHTML = mockup.contentHtml;

      inner.appendChild(label);
      inner.appendChild(content);
      slide.appendChild(inner);
      carousel.appendChild(slide);
    }

    // ── UI update ────────────────────────────────
    function updateUI() {
      const vis = visible();
      const hasSlides = vis.length > 0;

      emptyState.style.display = hasSlides ? 'none' : 'block';
      bottomBar.style.display = hasSlides ? 'block' : 'none';
      counterEl.textContent = hasSlides ? `${currentIndex + 1} / ${vis.length}` : '';

      const m = currentMockup();
      if (!m) return;

      // Vote buttons
      btnUp.className = 'vote-btn' + (m.vote === 'up' ? ' active-up' : '');
      btnDown.className = 'vote-btn' + (m.vote === 'down' ? ' active-down' : '');

      // Notes
      if (!recording) {
        notesEl.value = m.notes || '';
        autoResize();
      }

      // Slide border states
      const slides = carousel.querySelectorAll('.slide');
      mockups.forEach((mk, i) => {
        if (!slides[i]) return;
        const inner = slides[i].querySelector('.slide-inner');
        inner.classList.toggle('liked', mk.vote === 'up');
        inner.classList.toggle('disliked', mk.vote === 'down');
      });

      if (fitMode) applyFitScale();
    }

    // ── Voting ───────────────────────────────────
    function vote(dir) {
      const m = currentMockup();
      if (!m) return;
      m.vote = m.vote === dir ? null : dir;
      updateUI();
    }

    btnUp.onclick = () => vote('up');
    btnDown.onclick = () => vote('down');

    // ── Notes ────────────────────────────────────
    function autoResize() {
      notesEl.style.height = 'auto';
      notesEl.style.height = Math.min(notesEl.scrollHeight, 100) + 'px';
    }

    notesEl.addEventListener('input', () => {
      const m = currentMockup();
      if (m) m.notes = notesEl.value;
      autoResize();
    });
    notesEl.addEventListener('focus', () => { notesActive = true; });
    notesEl.addEventListener('blur', () => { notesActive = false; });

    // ── Keyboard ─────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (notesActive && e.key !== 'Escape') return;

      switch (e.key) {
        case 'ArrowLeft':  e.preventDefault(); navigate(-1); break;
        case 'ArrowRight': e.preventDefault(); navigate(1); break;
        case 'ArrowUp':    e.preventDefault(); vote('up'); break;
        case 'ArrowDown':  e.preventDefault(); vote('down'); break;
        case ' ':
          e.preventDefault();
          if (!recording) startRecording();
          break;
        case 'Tab':
          e.preventDefault();
          notesEl.focus();
          break;
        case 'Escape':
          e.preventDefault();
          notesEl.blur();
          break;
        case 'f': case 'F':
          if (!notesActive) { e.preventDefault(); toggleFit(); }
          break;
        case 'c': case 'C':
          if (!notesActive) { e.preventDefault(); copyFeedback(); }
          break;
        case '?':
          if (!notesActive) { e.preventDefault(); toggleHelp(); }
          break;
      }
    });

    function toggleHelp() {
      helpOverlay.classList.toggle('visible');
    }
    helpBtn.onclick = toggleHelp;
    document.addEventListener('click', (e) => {
      if (!helpBtn.contains(e.target) && !helpOverlay.contains(e.target)) {
        helpOverlay.classList.remove('visible');
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === ' ' && recording) {
        e.preventDefault();
        stopRecording();
      }
    });

    // ── Fit mode ──────────────────────────────────
    const fitBtn = $('fit-btn');
    let fitMode = false;

    function toggleFit() {
      fitMode = !fitMode;
      document.body.classList.toggle('fit-mode', fitMode);
      fitBtn.classList.toggle('active', fitMode);
      fitBtn.textContent = fitMode ? 'Fit ✓' : 'Fit';
      // Reset scroll positions
      carousel.querySelectorAll('.slide').forEach(s => s.scrollTop = 0);
      applyFitScale();
    }

    function applyFitScale() {
      const slides = carousel.querySelectorAll('.slide');
      slides.forEach(slide => {
        const inner = slide.querySelector('.slide-inner');
        if (!inner) return;
        if (!fitMode) { inner.style.transform = ''; return; }
        // offsetHeight/offsetWidth give layout size unaffected by CSS transforms —
        // no need to reset transform (which caused a flash during carousel transitions)
        const naturalH = inner.offsetHeight;
        const naturalW = inner.offsetWidth;
        const availH = window.innerHeight - 48 - 120;
        const availW = window.innerWidth - 64;
        const scaleH = naturalH > availH ? availH / naturalH : 1;
        const scaleW = naturalW > availW ? availW / naturalW : 1;
        const scale = Math.min(scaleH, scaleW);
        inner.style.transform = scale < 0.98 ? `scale(${scale})` : '';
      });
    }

    fitBtn.onclick = toggleFit;
    window.addEventListener('resize', () => { if (fitMode) applyFitScale(); });

    // ── Copy feedback ────────────────────────────
    function copyFeedback() {
      const sections = [];
      for (const m of mockups) {
        const vote = m.vote === 'up' ? '👍' : m.vote === 'down' ? '👎' : '—';
        const hasNotes = m.notes && m.notes.trim();
        if (!hasNotes && !m.vote) continue; // skip entirely untouched mockups
        let section = `### ${m.label}  [${vote}]`;
        if (hasNotes) section += '\n' + m.notes.trim();
        sections.push(section);
      }
      // Append untouched ones as a compact list
      const untouched = mockups.filter(m => !m.vote && !(m.notes && m.notes.trim()));
      if (untouched.length) {
        sections.push('### No feedback\n' + untouched.map(m => '- ' + m.label).join('\n'));
      }
      const text = sections.join('\n\n');
      navigator.clipboard.writeText(text.trim()).then(() => {
        copyBtn.textContent = '✓';
        setTimeout(() => { copyBtn.textContent = '📋'; }, 1500);
      });
    }

    copyBtn.onclick = copyFeedback;

    function flash(msg) {
      micBtn.title = msg;
      micBtn.style.borderColor = '#c4763c';
      setTimeout(() => { micBtn.style.borderColor = ''; updateVoiceStatus(); }, 2000);
    }

    const voiceEnabled = !!window.__SONIOX_KEY;

    function updateVoiceStatus() {
      if (!voiceEnabled) {
        micBtn.style.display = 'none';
        return;
      }
      if (!audioReady) micBtn.title = 'Mic unavailable';
      else if (!sonioxWs || sonioxWs.readyState !== WebSocket.OPEN) micBtn.title = 'Voice connecting…';
      else micBtn.title = 'Hold Space to record';
    }

    // ── Audio / Soniox voice ─────────────────────
    let audioCtx, analyser, mediaStream, sourceNode, scriptNode, sonioxWs;
    let audioReady = false;
    let transcript = { final: '', nonfinal: '' };
    let preRecordingNotes = '';
    let keepaliveTimer;
    let barHeights = new Float32Array(24);

    async function initAudio() {
      if (!voiceEnabled) return;
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        audioReady = true;
      } catch (err) {
        console.error('Mic init failed:', err);
      }
    }

    function connectSoniox() {
      if (!voiceEnabled) return;

      sonioxWs = new WebSocket('wss://stt-rt.soniox.com/transcribe-websocket');

      sonioxWs.onopen = () => {
        sonioxWs.send(JSON.stringify({
          api_key: window.__SONIOX_KEY,
          model: 'stt-rt-preview',
          audio_format: 'pcm_s16le',
          sample_rate: 16000,
          num_channels: 1,
          language_hints: ['en'],
        }));
        keepaliveTimer = setInterval(() => {
          if (sonioxWs.readyState === WebSocket.OPEN && !recording) {
            sonioxWs.send(new Int16Array(160).buffer);
          }
        }, 10000);
        updateVoiceStatus();
      };

      sonioxWs.onmessage = (e) => {
        try { handleSonioxMsg(JSON.parse(e.data)); }
        catch (err) { console.warn('Soniox parse:', err, e.data); }
      };

      sonioxWs.onerror = (err) => console.error('Soniox error:', err);
      sonioxWs.onclose = () => {
        clearInterval(keepaliveTimer);
        updateVoiceStatus();
        setTimeout(connectSoniox, 3000);
      };
    }

    function cleanToken(text) {
      return text.replace(/<\/?fin>/gi, '').replace(/<[^>]*>/g, '');
    }

    function handleSonioxMsg(data) {
      if (data.finished) return;
      if (data.tokens) {
        let nft = '';
        for (const tok of data.tokens) {
          const text = cleanToken(tok.text);
          if (!text) continue;
          if (tok.is_final) transcript.final += text;
          else nft += text;
        }
        transcript.nonfinal = nft;
      }
      streamToTextarea();
    }

    function streamToTextarea() {
      const m = currentMockup();
      if (!m || !recording) return;
      const streamed = (transcript.final + transcript.nonfinal).trim();
      m.notes = preRecordingNotes + (preRecordingNotes && streamed ? '\n' : '') + streamed;
      notesEl.value = m.notes;
      autoResize();
      notesEl.scrollTop = notesEl.scrollHeight;
    }

    function startRecording() {
      if (!audioReady) { flash('Mic not available — allow mic access and reload'); return; }
      if (!sonioxWs || sonioxWs.readyState !== WebSocket.OPEN) { flash('Voice connecting…'); return; }
      recording = true;
      transcript = { final: '', nonfinal: '' };
      barHeights.fill(0);
      const m = currentMockup();
      preRecordingNotes = m ? (m.notes || '').trimEnd() : '';

      micBtn.classList.add('recording');
      waveform.classList.add('active');
      notesEl.classList.add('streaming');

      if (audioCtx.state === 'suspended') audioCtx.resume();

      sourceNode = audioCtx.createMediaStreamSource(mediaStream);
      scriptNode = audioCtx.createScriptProcessor(4096, 1, 1);

      const nativeSR = audioCtx.sampleRate;
      scriptNode.onaudioprocess = (e) => {
        if (!recording) return;
        e.outputBuffer.getChannelData(0).fill(0);
        const input = e.inputBuffer.getChannelData(0);
        const pcm16 = downsample(input, nativeSR, 16000);
        if (sonioxWs.readyState === WebSocket.OPEN) {
          sonioxWs.send(pcm16.buffer);
        }
      };

      sourceNode.connect(analyser);
      sourceNode.connect(scriptNode);
      scriptNode.connect(audioCtx.destination);

      drawWaveform();
    }

    function stopRecording() {
      recording = false;
      micBtn.classList.remove('recording');
      waveform.classList.remove('active');
      notesEl.classList.remove('streaming');

      if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
      if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }

      if (sonioxWs && sonioxWs.readyState === WebSocket.OPEN) {
        sonioxWs.send(JSON.stringify({ type: 'finalize' }));
      }

      // Wait for final tokens, then commit
      setTimeout(() => {
        const text = (transcript.final + transcript.nonfinal).trim();
        const m = currentMockup();
        if (m) {
          m.notes = preRecordingNotes + (preRecordingNotes && text ? '\n' : '') + text;
          notesEl.value = m.notes;
          autoResize();
        }
      }, 600);
    }

    function downsample(input, fromRate, toRate) {
      const ratio = fromRate / toRate;
      const len = Math.floor(input.length / ratio);
      const out = new Int16Array(len);
      for (let i = 0; i < len; i++) {
        const s = Math.max(-1, Math.min(1, input[Math.floor(i * ratio)]));
        out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return out;
    }

    // ── Waveform visualization (frequency bars) ────
    function drawWaveform() {
      if (!recording) return;
      const ctx = waveform.getContext('2d');
      const W = 140, H = 36;
      const freqData = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(freqData);

      ctx.clearRect(0, 0, W, H);

      const count = barHeights.length;
      const barW = 3, gap = (W - count * barW) / (count - 1);
      const binsPer = Math.floor(freqData.length / count);

      for (let i = 0; i < count; i++) {
        // Average frequency bins for this bar
        let sum = 0;
        for (let j = 0; j < binsPer; j++) sum += freqData[i * binsPer + j];
        const target = (sum / binsPer / 255) * H * 0.9;
        // Smooth: fast rise, slow fall
        barHeights[i] = target > barHeights[i]
          ? barHeights[i] * 0.3 + target * 0.7
          : barHeights[i] * 0.85 + target * 0.15;
        const bh = Math.max(2, barHeights[i]);
        const x = i * (barW + gap);
        const y = (H - bh) / 2;
        ctx.fillStyle = `rgba(239, 68, 68, ${0.4 + (bh / H) * 0.6})`;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, bh, 1.5);
        ctx.fill();
      }
      requestAnimationFrame(drawWaveform);
    }

    // ── SSE client ───────────────────────────────
    function connectSSE() {
      const es = new EventSource('/events');

      es.addEventListener('add', (e) => addMockup(JSON.parse(e.data)));
      es.addEventListener('update', (e) => updateMockupContent(JSON.parse(e.data)));
      es.addEventListener('remove', (e) => removeMockup(JSON.parse(e.data).id));

      es.onerror = () => { es.close(); setTimeout(connectSSE, 2000); };
    }

    function parseMockupHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      const section = div.querySelector('.mockup-section') || div.querySelector('section');
      if (section) {
        const id = section.dataset.mockupId || '';
        const labelEl = section.querySelector('.mockup-label');
        const label = labelEl ? labelEl.textContent.trim() : id;
        const content = section.querySelector('.mockup-content');
        return { id, label, contentHtml: content ? content.innerHTML : section.innerHTML };
      }
      return { id: '', label: '', contentHtml: html };
    }

    function addMockup(data) {
      if (mockups.find(m => m.id === data.id)) {
        updateMockupContent(data);
        return;
      }

      const parsed = parseMockupHtml(data.html);
      const mockup = {
        id: data.id,
        label: parsed.label || data.id,
        contentHtml: parsed.contentHtml,
        session: data.session || 0,
        vote: null,
        notes: '',
      };

      mockups.push(mockup);
      addSlide(mockup);

      if (mockups.length === 1) goTo(0);
      else updateUI();
      updateSessionPills();
    }

    function updateMockupContent(data) {
      const idx = mockups.findIndex(m => m.id === data.id);
      if (idx < 0) return;
      const parsed = parseMockupHtml(data.html);
      mockups[idx].contentHtml = parsed.contentHtml;
      mockups[idx].label = parsed.label || mockups[idx].label;

      const slides = carousel.querySelectorAll('.slide');
      if (slides[idx]) {
        const content = slides[idx].querySelector('.slide-content');
        const label = slides[idx].querySelector('.slide-label');
        if (content) content.innerHTML = parsed.contentHtml;
        if (label) label.textContent = mockups[idx].label;
      }
      updateUI();
    }

    function removeMockup(id) {
      const idx = mockups.findIndex(m => m.id === id);
      if (idx < 0) return;
      mockups.splice(idx, 1);
      const slides = carousel.querySelectorAll('.slide');
      if (slides[idx]) slides[idx].remove();

      if (currentIndex >= visible().length) {
        currentIndex = Math.max(0, visible().length - 1);
      }
      goTo(currentIndex);
      updateSessionPills();
    }

    // ── Sessions ─────────────────────────────────
    function updateSessionPills() {
      const sessionIds = [...new Set(mockups.map(m => m.session).filter(Boolean))].sort((a,b) => a-b);
      if (sessionIds.length <= 1) {
        sessionsEl.innerHTML = '';
        currentSession = null;
        return;
      }

      sessionsEl.innerHTML = '';

      const allPill = document.createElement('button');
      allPill.className = 'session-pill' + (currentSession === null ? ' active' : '');
      allPill.textContent = 'All';
      allPill.onclick = () => { currentSession = null; currentIndex = 0; goTo(0); updateSessionPills(); };
      sessionsEl.appendChild(allPill);

      for (const s of sessionIds) {
        const pill = document.createElement('button');
        pill.className = 'session-pill' + (currentSession === s ? ' active' : '');
        pill.textContent = `Round ${s}`;
        pill.onclick = () => {
          currentSession = currentSession === s ? null : s;
          currentIndex = 0;
          goTo(0);
          updateSessionPills();
        };
        sessionsEl.appendChild(pill);
      }
    }

    // ── Init ─────────────────────────────────────
    (async () => {
      connectSSE();
      updateVoiceStatus();
      if (voiceEnabled) {
        notesEl.placeholder = 'Notes… (Tab to focus, Space to dictate)';
        await initAudio();
        connectSoniox();
      } else {
        document.querySelector('.sc-voice')?.remove();
      }
    })();
  </script>
</body>
